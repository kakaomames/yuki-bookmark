<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YouTubeの表記揺れを網羅したGemini programming隊の特製ページ">
    <meta name="keywords" content="YouTube, yt, YOUTUBE, WebEdition, Programming">
    <meta name="author" content="Gemini programming隊">
    <meta property="og:title" content="YouTube Notation Chaos">
    <meta property="og:image" content="https://kakaomames.github.io/rei/logo.png">
    <title>Youtubeといえば？</title>
    <style>
        :root {
            --yt-red: #ff0000;
            --yt-black: #282828;
            --yt-white: #ffffff;
        }

        body {
            background-color: var(--yt-black);
            color: var(--yt-white);
            font-family: 'Arial Black', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            border: 5px solid var(--yt-red);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.8);
            transform: rotate(-2deg);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 3px 3px 0px var(--yt-red);
        }

        .links-area {
            font-size: 2.5rem;
            line-height: 1.6;
        }

        /* 指定されたaタグのスタイル */
        a {
            color: var(--yt-white);
            text-decoration: none;
            position: relative;
            display: inline-block;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding: 0 10px;
            background: linear-gradient(transparent 70%, var(--yt-red) 70%);
        }

        a:hover {
            transform: scale(1.5) rotate(5deg);
            color: gold;
            background: var(--yt-red);
            z-index: 10;
        }

        a::before {
            content: "▶";
            position: absolute;
            left: -25px;
            opacity: 0;
            transition: 0.3s;
        }

        a:hover::before {
            opacity: 1;
            left: -35px;
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .bg-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            font-size: 10rem;
            word-wrap: break-word;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="bg-text">YT Y y YOUTUBE YouTube youtube</div>

    <div class="container">
        <img src="https://kakaomames.github.io/rei/logo.png" alt="Logo" class="logo">
        <h1>Youtubeといえば？</h1>
        
        <div class="links-area">
            <a href="yt">yt</a>？
            <a href="y">y</a>？
            <a href="YOUTUBE">YOUTUBE</a>？
            <a href="Youtube">Youtube</a>？
            <a href="YouTube">YouTube</a>？
            <a href="youtube">youtube</a>？
        </div>
    </div>

    <script>
        // 値が変わった時やクリックされた時にログを出す隊員向けの仕掛け
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // ページ遷移を一旦止めてログを優先
                console.log("ACTION: リンクがクリックされました -> " + this.getAttribute('href'));
                missionLog("MOVE", "遷移先候補: " + this.getAttribute('href') + ".html");
            });
        });

        function missionLog(type, msg) {
            console.log(`[${type}] ${new Date().toLocaleTimeString()}: ${msg}`);
        }
    </script>
</body>
</html>
